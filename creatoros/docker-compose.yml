version: '3.8'

services:
  # Database: PostgreSQL
  postgres:
    image: pgvector/pgvector:pg16
    container_name: creatoros_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-creatoros}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepassword}
      POSTGRES_DB: ${DB_NAME:-creatoros_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-creatoros}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - creatoros_network

  # Cache & Queue: Redis
  redis:
    image: redis:7-alpine
    container_name: creatoros_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - creatoros_network

  # Backend: NestJS API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: creatoros_api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-creatoros}:${DB_PASSWORD:-securepassword}@postgres:5432/${DB_NAME:-creatoros_db}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - creatoros_network

  # Frontend: Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    container_name: creatoros_web
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      - NODE_ENV=production
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - creatoros_network

volumes:
  postgres_data:
  redis_data:

networks:
  creatoros_network:
    driver: bridge
